services:
  - type: web
    name: compress-ultra-bot
    env: python
    buildCommand: pip install -r requirements.txt && apk add --no-cache ffmpeg
    startCommand: python bot.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false