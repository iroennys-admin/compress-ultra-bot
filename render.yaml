services:
  - type: web
    name: compress-ultra-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: compress-db
          property: connectionString

databases:
  - name: compress-db
    databaseName: compress_db
    user: compress_user
